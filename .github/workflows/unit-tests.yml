name: unit-tests
on: push

jobs:
  test:
    # strategy:
    #   matrix:
    #     runner: [ubuntu-latest, windows-latest]
    # runs-on: ${{ matrix.runner }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Run Test
        run: npm run test:ci
